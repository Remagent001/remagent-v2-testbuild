server {
    listen 80;
    server_name remagentemploymentprofessionals.com www.remagentemploymentprofessionals.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name remagentemploymentprofessionals.com www.remagentemploymentprofessionals.com;
    index index.html index.htm;
    root /www/wwwroot/staging;

    ssl_certificate     /etc/letsencrypt/live/remagentemploymentprofessionals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remagentemploymentprofessionals.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;

    # Block sensitive files
    location ~ ^/(\.|\.env|\.git|\.svn) {
        deny all;
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    # Next.js app routes — proxy to port 3020
    location ~ ^/(login|register|dashboard|onboarding|profile|jobs|my-jobs|inbox|settings|positions|search|applications|offers|api|_next) {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static marketing pages and assets from /www/wwwroot/staging/
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
        expires 30d;
        error_log /dev/null;
        access_log off;
    }

    location ~ .*\.(js|css)?$ {
        expires 12h;
        error_log /dev/null;
        access_log off;
    }

    access_log  /www/wwwlogs/remagentemploymentprofessionals.com.log;
    error_log   /www/wwwlogs/remagentemploymentprofessionals.com.error.log;
}
